<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Admin - Calendar Ignores</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
      .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 24px; max-width: 760px; margin: auto; }
      h2 { margin-top: 0; }
      input, button { padding: 10px 12px; font-size: 14px; margin: 6px 0; }
      input[type=date], input[type=password], input[type=text] { width: calc(100% - 24px); max-width: 100%; box-sizing: border-box; }
      button { cursor: pointer; }
      table { border-collapse: collapse; width: 100%; margin-top: 12px; }
      th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
      th { background: #f4f4f4; }
      .hidden { display: none; }
      .error { color: #b00020; }
      .success { color: #187bcd; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Admin Login</h2>
      <div id="login-view">
        <p>Enter the admin password to manage calendar ignores.</p>
        <input id="password" type="password" placeholder="Admin password" autocomplete="off" />
        <button id="login">Login</button>
        <p id="login-message" class="error"></p>
        <p>Use password <strong>admin123</strong>.</p>
      </div>

      <div id="admin-view" class="hidden">
        <p>Logged in as <strong>admin</strong>. <button id="logout">Logout</button></p>
        <div>
          <label>
            Date
            <input id="date" type="date" />
          </label>
          <label>
            Reason
            <input id="reason" type="text" placeholder="Reason (optional)" />
          </label>
          <button id="add">Add Ignore</button>
        </div>
        <h3>Existing Ignores</h3>
        <div id="list">Loading...</div>
      </div>
    </div>

    <script>
      const loginView = document.getElementById('login-view');
      const adminView = document.getElementById('admin-view');
      const loginMessage = document.getElementById('login-message');
      const passwordInput = document.getElementById('password');
      let authHeader = localStorage.getItem('adminAuth');

      const showLogin = () => {
        loginMessage.textContent = '';
        loginView.classList.remove('hidden');
        adminView.classList.add('hidden');
      };

      const showAdmin = () => {
        loginView.classList.add('hidden');
        adminView.classList.remove('hidden');
        loadIgnores();
      };

      const apiFetch = async (url, opts = {}) => {
        opts.headers = opts.headers || {};
        if (authHeader) {
          opts.headers.Authorization = authHeader;
        }
        const res = await fetch(url, opts);
        if (res.status === 401) {
          throw new Error('Unauthorized');
        }
        return res;
      };

      const login = async () => {
        const password = passwordInput.value.trim();
        if (!password) {
          loginMessage.textContent = 'Password is required.';
          return;
        }
        authHeader = 'Basic ' + btoa('admin:' + password);
        try {
          const res = await apiFetch('/api/calendar-ignores');
          if (!res.ok) throw new Error('Unauthorized');
          localStorage.setItem('adminAuth', authHeader);
          passwordInput.value = '';
          showAdmin();
        } catch (err) {
          loginMessage.textContent = 'Invalid password. Please use admin123.';
          authHeader = null;
          localStorage.removeItem('adminAuth');
        }
      };

      const loadIgnores = async () => {
        try {
          const res = await apiFetch('/api/calendar-ignores');
          const data = await res.json();
          const div = document.getElementById('list');
          if (!Array.isArray(data) || data.length === 0) {
            div.innerHTML = '<p><em>No ignore rules found.</em></p>';
            return;
          }
          let html = '<table><tr><th>Date</th><th>Reason</th><th>Action</th></tr>';
          for (const row of data) {
            html += `<tr><td>${row.date}</td><td>${row.reason || ''}</td><td><button data-date="${row.date}" class="del">Delete</button></td></tr>`;
          }
          html += '</table>';
          div.innerHTML = html;
          document.querySelectorAll('.del').forEach((button) => {
            button.onclick = async () => {
              if (!confirm('Delete ignore for ' + button.dataset.date + '?')) return;
              await apiFetch('/api/calendar-ignore/' + button.dataset.date, { method: 'DELETE' });
              loadIgnores();
            };
          });
        } catch (err) {
          showLogin();
        }
      };

      document.getElementById('login').onclick = login;
      document.getElementById('logout').onclick = () => {
        authHeader = null;
        localStorage.removeItem('adminAuth');
        showLogin();
      };
      document.getElementById('add').onclick = async () => {
        const date = document.getElementById('date').value;
        const reason = document.getElementById('reason').value;
        if (!date) {
          alert('Choose a date');
          return;
        }
        try {
          await apiFetch('/api/calendar-ignore', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date, reason }),
          });
          document.getElementById('date').value = '';
          document.getElementById('reason').value = '';
          loadIgnores();
        } catch (err) {
          showLogin();
        }
      };

      if (authHeader) {
        showAdmin();
      } else {
        showLogin();
      }
    </script>
  </body>
</html>
