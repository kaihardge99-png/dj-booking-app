services:
  - type: web
    name: dj-booking-app-kai99
    env: node
    plan: free
    branch: main
    buildCommand: "npm install && npm run build"
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://dj-booking-app-kai99.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dj-booking-db-kai99
          property: connectionString
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CALENDAR_ICS_URL
        sync: false
      - key: GOOGLE_APPOINTMENT_URL
        value: https://calendar.app.google/mzksDUh3UEkJfdJD8
      - key: ADMIN_PASSWORD
        value: admin123

databases:
  - name: dj-booking-db-kai99
    plan: free
    databaseName: dj_booking_app
    user: dj_booking_app_user

# Note: You still need to connect this repository to Render (via GitHub or GitLab)
# and create the service from the Render dashboard, or use the Render API.