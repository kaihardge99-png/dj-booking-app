services:
  - type: web
    name: dj-booking-app-kai99
    env: node
    plan: free
    branch: main
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://dj-booking-app-kai99.onrender.com

# Note: You still need to connect this repository to Render (via GitHub or GitLab)
# and create the service from the Render dashboard, or use the Render API.